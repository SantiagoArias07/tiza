# Render Blueprint — deploys the Tiza backend + a free Postgres database.
# In Render: New → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: tiza-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiza-db
          property: connectionString
      # Secret for signing login tokens — Render generates a random value.
      - key: JWT_SECRET
        generateValue: true
      # After deploying the frontend, set this to your Vercel URL
      # (e.g. https://tiza.vercel.app) so the browser is allowed to call the API.
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: tiza-db
    plan: free
